<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SciVerse Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1020;
      color: white;
      text-align: center;
    }

    header {
      background: #111a33;
      padding: 20px;
      font-size: 22px;
      font-weight: bold;
    }

    .container {
      margin-top: 60px;
    }

    .card {
      background: #1b2447;
      display: inline-block;
      margin: 15px;
      padding: 20px;
      width: 200px;
      border-radius: 12px;
    }

    a {
      color: #4dd0ff;
      text-decoration: none;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>
  🌌 SciVerse Portal
</header>

<div class="container">

  <div class="card">
    <h3>🌍 GeoLens</h3>
    <p>Earth Science</p>
    <a href="https://geolens.vercel.app">Enter</a>
  </div>

  <div class="card">
    <h3>🌠 AstroLens</h3>
    <p>Space Science</p>
    <a href="https://astrolens.vercel.app">Enter</a>
  </div>

</div>

</body>
</html>
